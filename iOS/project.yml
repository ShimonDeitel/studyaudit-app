name: Studyaudit
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Studyaudit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Studyaudit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyaudit
        DEVELOPMENT_TEAM: W7Q885Q59C
        INFOPLIST_FILE: Studyaudit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
    info:
      path: Studyaudit/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Studyaudit
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Studyaudit/Studyaudit.entitlements
      properties: {}
  StudyauditTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StudyauditTests
    dependencies:
      - target: Studyaudit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyaudit.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  StudyauditUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: StudyauditUITests
    dependencies:
      - target: Studyaudit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.studyaudit.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Studyaudit:
    build:
      targets:
        Studyaudit: all
    test:
      targets:
        - StudyauditTests
        - StudyauditUITests
    run:
      config: Debug
